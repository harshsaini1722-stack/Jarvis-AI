name: Android APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Find and Unzip
      run: |
        ZIP_FILE=$(find . -name "*.zip" | head -n 1)
        if [ -z "$ZIP_FILE" ]; then
          echo "❌ No ZIP file found!" && exit 1
        fi
        echo "Extracting $ZIP_FILE..."
        unzip "$ZIP_FILE" -d extracted_project

    - name: Show Folder Structure (Debug)
      run: |
        echo "=== Printing Root Files ==="
        ls -la
        echo "=== Printing Extracted Project Structure ==="
        find extracted_project -maxdepth 3
        
