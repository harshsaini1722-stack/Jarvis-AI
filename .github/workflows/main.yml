name: Android APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Unzip Source Project
      run: |
        unzip "jarvis-ai (3).zip" -d extracted_project
        # Move files to root if they are nested inside a subfolder
        if [ -d "extracted_project/jarvis-ai (2)" ]; then
          mv extracted_project/jarvis-ai\ \(2\)/* .
        elif [ -d "extracted_project/app" ]; then
          mv extracted_project/* .
        fi

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Jini-AI-App
        path: app/build/outputs/apk/debug/app-debug.apk
        
