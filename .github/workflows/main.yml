name: Android APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Extract ZIP and Setup Files
      run: |
        unzip "jarvis-ai (3).zip" -d extracted_project
        
        # Check if .env.example exists inside gradle folder and copy to root
        if [ -f "extracted_project/gradle/.env.example" ]; then
          cp "extracted_project/gradle/.env.example" ./.env.example
        fi
        
        # Move all contents to root
        cp -r extracted_project/* .
        rm -rf extracted_project

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Generate Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.2
        chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Jini-AI-App
        path: app/build/outputs/apk/debug/app-debug.apk
        
